<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Owner Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .chat-container { max-width: 800px; margin: 50px auto; }
        .chat-box { height: 60vh; overflow-y: scroll; border: 1px solid #ddd; padding: 15px; background: white; border-radius: 5px; }
        .message { margin-bottom: 15px; display: flex; }
        .user-message { justify-content: flex-end; }
        .bot-message .card { background-color: #e9ecef; }
        .message .card { max-width: 80%; }
        .spinner-border { width: 1.5rem; height: 1.5rem; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2 class="text-center mb-4">AI Owner Interface</h2>
        <div class="chat-box" id="chat-box">
            <div class="message bot-message">
                <div class="card card-body">Hello! I am your AI Owner. I can provide real-time forecasts or scan for trading candidates. For example: "What is the aggressive forecast for TSLA?" or "Find me bullish ideas."</div>
            </div>
        </div>
        <form id="chat-form" class="mt-3">
            <div class="input-group">
                <input type="text" id="user-input" class="form-control" placeholder="Ask a question..." required>
                <button class="btn btn-primary" type="submit" id="send-button">Send</button>
            </div>
        </form>
    </div>

<script>
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');
    const sendButton = document.getElementById('send-button');

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const question = userInput.value;
        if (!question.trim()) return;

        // Display user message and disable form
        addMessage(question, 'user');
        userInput.value = '';
        userInput.disabled = true;
        sendButton.disabled = true;
        
        // Show thinking indicator
        const thinkingIndicator = addMessage('<div class="spinner-border text-secondary" role="status"><span class="visually-hidden">Loading...</span></div>', 'bot');

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });

            const data = await response.json();
            // Using Markdown-it to render markdown from the bot's response
            const md = window.markdownit();
            const answer = data.answer ? md.render(data.answer) : `<span class="text-danger">Error: ${data.error}</span>`;
            
            // Remove thinking indicator and show final answer
            thinkingIndicator.querySelector('.card-body').innerHTML = answer;

        } catch (error) {
            thinkingIndicator.querySelector('.card-body').innerHTML = '<span class="text-danger">Failed to connect to the server. Is the Flask app running?</span>';
        } finally {
            // Re-enable form
            userInput.disabled = false;
            sendButton.disabled = false;
            userInput.focus();
        }
    });

    function addMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}-message`;
        
        const cardDiv = document.createElement('div');
        cardDiv.className = 'card card-body';
        cardDiv.innerHTML = text;
        
        messageDiv.appendChild(cardDiv);
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return messageDiv;
    }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/12.3.2/markdown-it.min.js"></script>
</body>
</html>
