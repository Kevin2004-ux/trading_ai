# .github/workflows/ci.yml

name: Python Application CI

# This workflow runs on any push or pull request to the 'main' branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checks out your repository's code
    - uses: actions/checkout@v3

    # Step 2: Sets up the specific Python version
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    # Step 3: Installs all the dependencies from your requirements.txt file
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    # Step 4: Runs your pytest test suite
    - name: Run tests
      run: |
        pytest